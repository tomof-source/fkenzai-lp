<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="今ある窓の内側に内窓を足して二重にすると、断熱・結露・暑さ・防音がまとめてやわらぐ仕組みの図解">
  <defs>
    <linearGradient id="zout" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3D5A86"/>
      <stop offset="1" stop-color="#6E89B0"/>
    </linearGradient>
    <linearGradient id="zin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBF3EA"/>
      <stop offset="1" stop-color="#FBF9F4"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#FBF9F4"/>

  <!-- 外 side -->
  <rect x="0" y="60" width="300" height="400" fill="url(#zout)" opacity="0.5"/>
  <!-- 室内 side -->
  <rect x="500" y="60" width="300" height="400" fill="url(#zin)"/>

  <text x="120" y="100" font-family="'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#27406A" text-anchor="middle">外</text>
  <text x="640" y="100" font-family="'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#1E3050" text-anchor="middle">室内</text>

  <!-- existing window pane -->
  <rect x="330" y="80" width="40" height="360" rx="6" fill="#BFD2E6" stroke="#1E3050" stroke-width="6"/>
  <text x="350" y="475" font-family="'Noto Sans JP', sans-serif" font-size="18" fill="#4C5763" text-anchor="middle">今ある窓</text>

  <!-- air gap highlight -->
  <rect x="378" y="80" width="44" height="360" rx="6" fill="#FFE8C9" opacity="0.6"/>
  <text x="400" y="510" font-family="'Noto Sans JP', sans-serif" font-size="17" fill="#BC5C2C" text-anchor="middle" font-weight="700">空気の層</text>

  <!-- inner window pane (内窓) -->
  <rect x="430" y="80" width="40" height="360" rx="6" fill="#F3E7D6" stroke="#BC5C2C" stroke-width="6"/>
  <text x="450" y="475" font-family="'Noto Sans JP', sans-serif" font-size="18" fill="#BC5C2C" text-anchor="middle" font-weight="700">内窓</text>

  <!-- heat / sound arrows from outside, blocked at gap -->
  <g stroke="#27406A" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M120 180 H330"/>
    <path d="M120 260 H330"/>
    <path d="M120 340 H330"/>
  </g>
  <g fill="#27406A">
    <polygon points="330,168 350,180 330,192"/>
    <polygon points="330,248 350,260 330,272"/>
    <polygon points="330,328 350,340 330,352"/>
  </g>
  <text x="150" y="160" font-family="'Noto Sans JP', sans-serif" font-size="16" fill="#27406A">熱・音・冷気</text>

  <!-- weakened arrows into room -->
  <g stroke="#9FB0C6" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="10 10">
    <path d="M470 220 H650"/>
    <path d="M470 300 H650"/>
  </g>
  <text x="640" y="200" font-family="'Noto Sans JP', sans-serif" font-size="16" fill="#7C8590" text-anchor="middle">やわらぐ</text>

  <!-- benefit chips -->
  <g font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="700" text-anchor="middle">
    <rect x="60"  y="525" width="155" height="50" rx="25" fill="#1E3050"/>
    <text x="137" y="558" fill="#fff">断熱</text>
    <rect x="245" y="525" width="155" height="50" rx="25" fill="#1E3050"/>
    <text x="322" y="558" fill="#fff">結露</text>
    <rect x="430" y="525" width="155" height="50" rx="25" fill="#1E3050"/>
    <text x="507" y="558" fill="#fff">暑さ</text>
    <rect x="615" y="525" width="155" height="50" rx="25" fill="#BC5C2C"/>
    <text x="692" y="558" fill="#fff">防音</text>
  </g>
</svg>
