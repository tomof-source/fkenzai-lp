<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="冬の窓際の冷えがやわらぐイメージ">
  <defs>
    <linearGradient id="dwarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF3EA"/>
      <stop offset="1" stop-color="#F2E1CE"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#dwarm)"/>
  <!-- window with snowy outside -->
  <rect x="300" y="70" width="320" height="300" rx="10" fill="#A9C0DA"/>
  <circle cx="540" cy="140" r="34" fill="#EAF1F8" opacity="0.85"/>
  <g fill="#fff" opacity="0.9">
    <circle cx="360" cy="150" r="6"/><circle cx="420" cy="220" r="5"/><circle cx="470" cy="300" r="6"/>
    <circle cx="560" cy="250" r="5"/><circle cx="390" cy="320" r="5"/><circle cx="600" cy="180" r="5"/>
  </g>
  <g fill="none" stroke="#1E3050" stroke-width="12"><rect x="300" y="70" width="320" height="300" rx="10"/><line x1="460" y1="70" x2="460" y2="370"/></g>
  <rect x="312" y="82" width="296" height="276" rx="6" fill="none" stroke="#BC5C2C" stroke-width="4" opacity="0.5"/>
  <!-- warmth waves inside -->
  <g stroke="#BC5C2C" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M150 210 q24 -26 48 0 t48 0"/>
    <path d="M150 260 q24 -26 48 0 t48 0"/>
    <path d="M150 310 q24 -26 48 0 t48 0"/>
  </g>
  <text x="660" y="240" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#1E3050" text-anchor="middle">窓際、<tspan x="660" dy="30">あたたか</tspan></text>
  <g><rect x="24" y="24" width="120" height="38" rx="19" fill="#122036" opacity="0.78"/><text x="84" y="50" font-family="'Noto Sans JP', sans-serif" font-size="18" fill="#FBF9F4" text-anchor="middle">イメージ</text></g>
</svg>
