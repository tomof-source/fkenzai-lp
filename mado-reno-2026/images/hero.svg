<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="窓辺のある暮らしのイメージ">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A3F63"/>
      <stop offset="0.55" stop-color="#3D5A86"/>
      <stop offset="1" stop-color="#C98B5E"/>
    </linearGradient>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF9F4"/>
      <stop offset="1" stop-color="#EFE7D6"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF4DF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFF4DF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#room)"/>

  <!-- window opening -->
  <rect x="430" y="120" width="740" height="600" rx="10" fill="url(#sky)"/>
  <!-- distant hills -->
  <path d="M430 560 Q620 470 800 540 T1170 520 V720 H430 Z" fill="#324B72" opacity="0.55"/>
  <!-- sun glow -->
  <circle cx="980" cy="470" r="120" fill="#FFE0B0" opacity="0.55"/>
  <circle cx="980" cy="470" r="70" fill="#FFEDCF" opacity="0.8"/>

  <!-- light beam into room -->
  <polygon points="1170,150 1560,520 1560,860 760,860" fill="url(#light)"/>

  <!-- window frame -->
  <g fill="none" stroke="#1E3050" stroke-width="14">
    <rect x="430" y="120" width="740" height="600" rx="10"/>
    <line x1="800" y1="120" x2="800" y2="720"/>
    <line x1="430" y1="420" x2="1170" y2="420"/>
  </g>
  <!-- inner frame hint (内窓) -->
  <rect x="452" y="142" width="696" height="556" rx="6" fill="none" stroke="#BC5C2C" stroke-width="4" stroke-dasharray="2 0" opacity="0.55"/>

  <!-- sill -->
  <rect x="400" y="720" width="800" height="26" rx="6" fill="#1E3050"/>

  <!-- plant on sill -->
  <g>
    <rect x="500" y="660" width="58" height="60" rx="8" fill="#BC5C2C"/>
    <path d="M529 660 C500 600 510 560 529 540 C548 560 558 600 529 660 Z" fill="#3E6B4F"/>
    <path d="M529 660 C560 612 600 600 614 612 C600 648 566 664 529 668 Z" fill="#4C7E5E"/>
    <path d="M529 660 C498 612 458 600 444 612 C458 648 492 664 529 668 Z" fill="#578a69"/>
  </g>
  <!-- mug -->
  <g>
    <rect x="1040" y="676" width="70" height="44" rx="8" fill="#EDE3D0" stroke="#1E3050" stroke-width="4"/>
    <path d="M1110 686 q26 0 26 18 t-26 18" fill="none" stroke="#1E3050" stroke-width="4"/>
    <path d="M1058 668 q6 -16 0 -28 M1082 668 q6 -16 0 -28" fill="none" stroke="#C9B79A" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- イメージ chip -->
  <g>
    <rect x="40" y="40" width="190" height="46" rx="23" fill="#122036" opacity="0.78"/>
    <text x="135" y="70" font-family="'Noto Sans JP', sans-serif" font-size="22" fill="#FBF9F4" text-anchor="middle">イメージ（写真は手配中）</text>
  </g>
</svg>
