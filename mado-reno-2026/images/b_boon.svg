<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="外の音が気になりにくくなるイメージ">
  <rect width="800" height="450" fill="#EAEDF1"/>
  <!-- sound source outside (left) -->
  <g stroke="#27406A" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M120 160 q34 60 0 130"/>
    <path d="M170 130 q56 95 0 190"/>
    <path d="M220 110 q78 115 0 230"/>
  </g>
  <text x="120" y="100" font-family="'Noto Sans JP', sans-serif" font-size="18" fill="#27406A" text-anchor="middle">外の音</text>
  <!-- window (double) -->
  <rect x="340" y="70" width="320" height="300" rx="10" fill="#CBDAEA"/>
  <g fill="none" stroke="#1E3050" stroke-width="12"><rect x="340" y="70" width="320" height="300" rx="10"/><line x1="500" y1="70" x2="500" y2="370"/></g>
  <rect x="352" y="82" width="296" height="276" rx="6" fill="none" stroke="#BC5C2C" stroke-width="5" opacity="0.6"/>
  <!-- dampened waves inside (right), faint -->
  <g stroke="#A9B6C7" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="8 9" opacity="0.8">
    <path d="M690 200 q-18 30 0 60"/>
  </g>
  <text x="710" y="170" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#1E3050" text-anchor="middle">静か</text>
  <g><rect x="24" y="24" width="120" height="38" rx="19" fill="#122036" opacity="0.78"/><text x="84" y="50" font-family="'Noto Sans JP', sans-serif" font-size="18" fill="#FBF9F4" text-anchor="middle">イメージ</text></g>
</svg>
