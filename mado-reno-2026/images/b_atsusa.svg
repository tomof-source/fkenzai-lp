<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="夏の西日による暑さがやわらぐイメージ">
  <defs>
    <linearGradient id="ahot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8A24E"/>
      <stop offset="1" stop-color="#FBF9F4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#ahot)"/>
  <!-- sun -->
  <circle cx="120" cy="150" r="58" fill="#E8852E"/>
  <g stroke="#E8852E" stroke-width="9" stroke-linecap="round">
    <line x1="120" y1="50" x2="120" y2="20"/><line x1="120" y1="250" x2="120" y2="280"/>
    <line x1="20" y1="150" x2="-10" y2="150"/>
    <line x1="50" y1="80" x2="28" y2="58"/><line x1="190" y1="80" x2="212" y2="58"/>
    <line x1="50" y1="220" x2="28" y2="242"/><line x1="190" y1="220" x2="212" y2="242"/>
  </g>
  <!-- heat rays toward window, blocked -->
  <g stroke="#D9762A" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M200 170 H330"/><path d="M210 230 H330"/>
  </g>
  <!-- window -->
  <rect x="340" y="70" width="320" height="300" rx="10" fill="#CFE0EE"/>
  <g fill="none" stroke="#1E3050" stroke-width="12"><rect x="340" y="70" width="320" height="300" rx="10"/><line x1="500" y1="70" x2="500" y2="370"/></g>
  <rect x="352" y="82" width="296" height="276" rx="6" fill="none" stroke="#BC5C2C" stroke-width="4" opacity="0.5"/>
  <!-- cool inside -->
  <text x="700" y="220" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#1E3050" text-anchor="middle">室内は<tspan x="700" dy="30">ひんやり</tspan></text>
  <g><rect x="24" y="24" width="120" height="38" rx="19" fill="#122036" opacity="0.78"/><text x="84" y="50" font-family="'Noto Sans JP', sans-serif" font-size="18" fill="#FBF9F4" text-anchor="middle">イメージ</text></g>
</svg>
