<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="電車の通過音が窓に届き、内窓PLASTで空気層をつくると室内に届く音が小さくなる仕組み図">
  <rect width="800" height="600" fill="#FBF9F4"/>
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#E6E0D2" stroke-width="2"/>
  <text x="400" y="48" text-anchor="middle" font-family="'Noto Serif JP',serif" font-size="22" font-weight="700" fill="#1E3050">電車の通過音が、窓で小さくなる仕組み</text>
  <line x1="60" y1="80" x2="740" y2="80" stroke="#DAD3C2" stroke-width="1"/>
  <g>
    <text x="160" y="120" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="14" font-weight="700" fill="#BC5C2C">1．外</text>
    <text x="160" y="142" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="13" fill="#4C5763">電車の通過音</text>
    <rect x="40" y="160" width="240" height="120" rx="6" fill="#FFFFFF" stroke="#E6E0D2"/>
    <rect x="60" y="220" width="200" height="40" fill="#3A4E72"/>
    <rect x="60" y="216" width="200" height="6" fill="#506A95"/>
    <rect x="68" y="226" width="22" height="26" fill="#FBF3DC"/>
    <rect x="96" y="226" width="22" height="26" fill="#FBF3DC"/>
    <rect x="124" y="226" width="22" height="26" fill="#FBF3DC"/>
    <rect x="152" y="226" width="22" height="26" fill="#FBF3DC"/>
    <rect x="180" y="226" width="22" height="26" fill="#FBF3DC"/>
    <rect x="208" y="226" width="22" height="26" fill="#FBF3DC"/>
    <rect x="236" y="226" width="22" height="26" fill="#FBF3DC"/>
    <line x1="40" y1="270" x2="280" y2="270" stroke="#9FB2C9" stroke-width="2"/>
    <g stroke="#BC5C2C" stroke-linecap="round" fill="none">
      <path d="M60 200 Q 95 230 60 260" stroke-width="5"/>
      <path d="M88 196 Q 125 230 88 264" stroke-width="4"/>
      <path d="M116 192 Q 154 230 116 268" stroke-width="3"/>
    </g>
  </g>
  <g>
    <text x="400" y="120" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="14" font-weight="700" fill="#1E3050">2．窓のあたり</text>
    <text x="400" y="142" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="13" fill="#4C5763">空気の層で音をやわらげる</text>
    <rect x="300" y="160" width="200" height="280" rx="6" fill="#FFFFFF" stroke="#E6E0D2"/>
    <rect x="316" y="220" width="14" height="180" rx="2" fill="#9FB2C9"/>
    <rect x="330" y="220" width="56" height="180" fill="#EAF1F8"/>
    <rect x="386" y="220" width="14" height="180" rx="2" fill="#9FB2C9"/>
    <text x="358" y="216" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#7C8590">今ある窓</text>
    <rect x="416" y="220" width="14" height="180" rx="2" fill="#1E3050"/>
    <rect x="430" y="220" width="50" height="180" fill="#F2ECDF"/>
    <rect x="480" y="220" width="14" height="180" rx="2" fill="#1E3050"/>
    <text x="455" y="216" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#1E3050">内窓PLAST</text>
    <text x="408" y="416" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#BC5C2C">空気の層</text>
    <g stroke="#BC5C2C" stroke-linecap="round" fill="none">
      <path d="M308 270 Q 320 290 308 310" stroke-width="4"/>
      <path d="M324 274 Q 333 290 324 306" stroke-width="3"/>
    </g>
    <g stroke="#9FB2C9" stroke-linecap="round" fill="none">
      <path d="M496 290 Q 502 295 496 300" stroke-width="2"/>
    </g>
  </g>
  <g>
    <text x="640" y="120" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="14" font-weight="700" fill="#1E3050">3．室内</text>
    <text x="640" y="142" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="13" fill="#4C5763">届く音は小さくなる</text>
    <rect x="520" y="160" width="240" height="280" rx="6" fill="#FFFFFF" stroke="#E6E0D2"/>
    <rect x="540" y="328" width="200" height="72" rx="4" fill="#F2ECDF"/>
    <rect x="556" y="340" width="48" height="40" rx="2" fill="#FBF9F4" stroke="#DAD3C2"/>
    <rect x="610" y="340" width="48" height="40" rx="2" fill="#FBF9F4" stroke="#DAD3C2"/>
    <rect x="664" y="340" width="60" height="40" rx="2" fill="#FBF9F4" stroke="#DAD3C2"/>
    <text x="640" y="394" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#7C8590">寝室・LDK</text>
    <g stroke="#4C5763" stroke-linecap="round" fill="none" opacity="0.5">
      <path d="M548 240 Q 554 250 548 260" stroke-width="2"/>
    </g>
    <text x="640" y="280" text-anchor="middle" font-family="'Noto Serif JP',serif" font-size="20" font-weight="700" fill="#1E3050">静かに</text>
  </g>
  <g>
    <rect x="50" y="468" width="700" height="100" rx="10" fill="#FFFFFF" stroke="#E6E0D2"/>
    <text x="400" y="500" text-anchor="middle" font-family="'Noto Serif JP',serif" font-size="16" font-weight="700" fill="#1E3050">電車の音は、窓から入る。窓の対策で、室内は変わる。</text>
    <text x="400" y="528" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="13" fill="#4C5763">空気の層が大きいほど、低い音まで届きにくくなります。</text>
    <text x="400" y="552" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#7C8590">魔法瓶が温度を保つのと、考え方は同じです。</text>
  </g>
  <g>
    <rect x="20" y="20" width="86" height="24" rx="5" fill="#122036"/>
    <text x="63" y="38" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FBF9F4">イメージ</text>
  </g>
</svg>
