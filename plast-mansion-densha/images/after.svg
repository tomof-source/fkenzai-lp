  <rect x="395" y="120" width="10" height="380" fill="#A8B5C5"/>
  <rect x="180" y="140" width="440" height="340" fill="#FBF9F4" opacity="0.6"/>
  <rect x="180" y="140" width="16" height="340" rx="2" fill="#1E3050"/>
  <rect x="604" y="140" width="16" height="340" rx="2" fill="#1E3050"/>
  <rect x="180" y="140" width="440" height="16" fill="#1E3050"/>
