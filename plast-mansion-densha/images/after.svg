<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="内窓PLAST設置後のマンション窓のイメージ（二重サッシ）">
  <defs>
