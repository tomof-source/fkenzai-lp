  <line x1="194" y1="138" x2="280" y2="138" stroke="#1E3050"/>
  <text x="305" y="178" font-family="'Noto Sans JP',sans-serif" font-size="13" fill="#1B232E" opacity="0.6">既存のアルミサッシ（残したまま）</text>
  <g opacity="0.6">
    <rect x="140" y="378" width="540" height="120" fill="#7080A0"/>
