  </defs>
  <rect width="800" height="600" fill="#F2ECDF"/>
  <rect x="60" y="60" width="680" height="480" rx="12" fill="#FFFFFF" stroke="#E6E0D2" stroke-width="2"/>
  <rect x="120" y="100" width="560" height="400" fill="url(#aft_sky)" opacity="0.72"/>
  <rect x="120" y="100" width="20" height="400" fill="#A8B5C5"/>
