<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="エコ引違い雨戸を後付けし、閉めたまま羽根を開けて風を通している窓のイメージイラスト">
  <defs>
    <linearGradient id="af" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF4DF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFF4DF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#EFE8D8"/>
  <!-- window opening -->
  <rect x="180" y="110" width="440" height="400" rx="8" fill="#BFD2E6" stroke="#1E3050" stroke-width="8"/>
  <!-- louver shutter with open blades -->
  <g fill="#4C678F" stroke="#243a5c" stroke-width="1.5">
    <polygon points="196,134 604,112 604,134 196,156"/>
    <polygon points="196,182 604,160 604,182 196,204"/>
    <polygon points="196,230 604,208 604,230 196,252"/>
    <polygon points="196,278 604,256 604,278 196,300"/>
    <polygon points="196,326 604,304 604,326 196,348"/>
    <polygon points="196,374 604,352 604,374 196,396"/>
    <polygon points="196,422 604,400 604,422 196,444"/>
    <polygon points="196,470 604,448 604,470 196,492"/>
  </g>
  <line x1="400" y1="110" x2="400" y2="510" stroke="#1E3050" stroke-width="6"/>
  <!-- light coming through -->
  <polygon points="620,150 780,280 780,470 620,420" fill="url(#af)"/>
  <!-- breeze -->
  <g stroke="#BC5C2C" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M636 250 q40 -20 80 0 t80 0"/>
  </g>
  <text x="400" y="560" font-family="'Noto Sans JP', sans-serif" font-size="24" fill="#1E3050" text-anchor="middle" font-weight="700">閉めたまま、風を通す</text>
  <!-- イラスト label -->
  <g>
    <rect x="28" y="28" width="250" height="40" rx="20" fill="#122036" opacity="0.82"/>
    <text x="153" y="55" font-family="'Noto Sans JP', sans-serif" font-size="19" fill="#FBF9F4" text-anchor="middle">イメージイラスト</text>
  </g>
</svg>
