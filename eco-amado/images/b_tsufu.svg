<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="閉めたまま羽根を開けて風を取り込む通風のイメージ">
  <defs>
    <linearGradient id="lt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF4DF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFF4DF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#F4EFE3"/>
  <!-- shutter with open blades -->
  <rect x="250" y="55" width="300" height="340" rx="10" fill="#E9DFCB" stroke="#1E3050" stroke-width="6"/>
  <g fill="#4C678F" stroke="#243a5c" stroke-width="1.5">
    <polygon points="266,80 534,62 534,82 266,100"/>
    <polygon points="266,124 534,106 534,126 266,144"/>
    <polygon points="266,168 534,150 534,170 266,188"/>
    <polygon points="266,212 534,194 534,214 266,232"/>
    <polygon points="266,256 534,238 534,258 266,276"/>
    <polygon points="266,300 534,282 534,302 266,320"/>
    <polygon points="266,344 534,326 534,346 266,364"/>
  </g>
  <!-- light through gaps -->
  <g fill="url(#lt)">
    <polygon points="534,100 720,150 720,210 534,150"/>
    <polygon points="534,232 720,282 720,342 534,282"/>
  </g>
  <!-- breeze -->
  <g stroke="#BC5C2C" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M560 120 q40 -20 80 0 t80 0"/>
    <path d="M560 320 q40 -20 80 0 t80 0"/>
  </g>
  <text x="400" y="428" font-family="'Noto Sans JP', sans-serif" font-size="22" fill="#1E3050" text-anchor="middle" font-weight="700">閉めたまま、風を通す</text>
  <g>
    <rect x="24" y="24" width="120" height="34" rx="17" fill="#122036" opacity="0.78"/>
    <text x="84" y="47" font-family="'Noto Sans JP', sans-serif" font-size="17" fill="#FBF9F4" text-anchor="middle">イメージ</text>
  </g>
</svg>
