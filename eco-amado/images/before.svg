<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="雨戸がなく、昼間もカーテンを閉めて暗くしている窓のイメージイラスト">
  <rect width="800" height="600" fill="#D9D2C4"/>
  <!-- room wall -->
  <rect x="0" y="0" width="800" height="600" fill="#E7E0D1"/>
  <!-- window opening -->
  <rect x="180" y="110" width="440" height="400" rx="8" fill="#B9C4CF" stroke="#1E3050" stroke-width="8"/>
  <line x1="400" y1="110" x2="400" y2="510" stroke="#1E3050" stroke-width="6"/>
  <!-- curtains drawn, dim -->
  <g fill="#9A8F7C">
    <path d="M188 118 q20 200 0 384 q26 -10 26 -40 q-18 -150 0 -304 q-2 -30 -26 -40 Z"/>
    <path d="M612 118 q-20 200 0 384 q-26 -10 -26 -40 q18 -150 0 -304 q2 -30 26 -40 Z"/>
    <path d="M300 118 q14 200 0 384 q26 -10 26 -40 q-12 -150 0 -304 q0 -30 -26 -40 Z"/>
    <path d="M500 118 q-14 200 0 384 q-26 -10 -26 -40 q12 -150 0 -304 q0 -30 26 -40 Z"/>
  </g>
  <!-- dim overlay -->
  <rect x="180" y="110" width="440" height="400" rx="8" fill="#1E2535" opacity="0.28"/>
  <text x="400" y="560" font-family="'Noto Sans JP', sans-serif" font-size="24" fill="#4C5763" text-anchor="middle" font-weight="700">昼間もカーテンで閉ざしがち</text>
  <!-- イラスト label -->
  <g>
    <rect x="28" y="28" width="250" height="40" rx="20" fill="#122036" opacity="0.82"/>
    <text x="153" y="55" font-family="'Noto Sans JP', sans-serif" font-size="19" fill="#FBF9F4" text-anchor="middle">イメージイラスト</text>
  </g>
</svg>
