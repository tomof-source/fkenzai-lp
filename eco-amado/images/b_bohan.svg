<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="窓の前にもう一枚の備えがあり、窓ガラスに近づきにくくなる防犯のイメージ">
  <rect width="800" height="450" fill="#EEF1ED"/>
  <!-- glass window behind -->
  <rect x="300" y="70" width="300" height="310" rx="6" fill="#CFE0EC" stroke="#9FB0C6" stroke-width="5"/>
  <line x1="450" y1="70" x2="450" y2="380" stroke="#9FB0C6" stroke-width="4"/>
  <!-- shutter frame in front -->
  <rect x="270" y="58" width="360" height="334" rx="10" fill="none" stroke="#1E3050" stroke-width="7"/>
  <g fill="#4C678F" opacity="0.92" stroke="#243a5c" stroke-width="1.5">
    <rect x="282" y="74" width="336" height="22" rx="6"/>
    <rect x="282" y="108" width="336" height="22" rx="6"/>
    <rect x="282" y="142" width="336" height="22" rx="6"/>
    <rect x="282" y="176" width="336" height="22" rx="6"/>
    <rect x="282" y="210" width="336" height="22" rx="6"/>
    <rect x="282" y="244" width="336" height="22" rx="6"/>
    <rect x="282" y="278" width="336" height="22" rx="6"/>
    <rect x="282" y="312" width="336" height="22" rx="6"/>
    <rect x="282" y="346" width="336" height="22" rx="6"/>
  </g>
  <!-- shield mark -->
  <g transform="translate(450,225)">
    <path d="M0 -52 L46 -34 V6 C46 40 24 58 0 70 C-24 58 -46 40 -46 6 V-34 Z" fill="#BC5C2C" opacity="0.95"/>
    <path d="M-20 4 L-6 20 L22 -16" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="425" font-family="'Noto Sans JP', sans-serif" font-size="22" fill="#1E3050" text-anchor="middle" font-weight="700">窓の前に、もう一枚の備え</text>
  <g>
    <rect x="24" y="24" width="120" height="34" rx="17" fill="#122036" opacity="0.78"/>
    <text x="84" y="47" font-family="'Noto Sans JP', sans-serif" font-size="17" fill="#FBF9F4" text-anchor="middle">イメージ</text>
  </g>
</svg>
