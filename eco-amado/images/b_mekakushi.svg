<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="ルーバーを閉じると外から室内が見えにくくなる目隠しのイメージ">
  <rect width="800" height="450" fill="#EAF0F6"/>
  <rect x="240" y="50" width="320" height="350" rx="10" fill="#E9DFCB" stroke="#1E3050" stroke-width="6"/>
  <!-- closed louver blades -->
  <g fill="#4C678F" stroke="#243a5c" stroke-width="1.5">
    <rect x="258" y="68" width="284" height="20" rx="5"/>
    <rect x="258" y="98" width="284" height="20" rx="5"/>
    <rect x="258" y="128" width="284" height="20" rx="5"/>
    <rect x="258" y="158" width="284" height="20" rx="5"/>
    <rect x="258" y="188" width="284" height="20" rx="5"/>
    <rect x="258" y="218" width="284" height="20" rx="5"/>
    <rect x="258" y="248" width="284" height="20" rx="5"/>
    <rect x="258" y="278" width="284" height="20" rx="5"/>
    <rect x="258" y="308" width="284" height="20" rx="5"/>
    <rect x="258" y="338" width="284" height="20" rx="5"/>
    <rect x="258" y="368" width="284" height="20" rx="5"/>
  </g>
  <!-- eye outside, blocked -->
  <g>
    <circle cx="120" cy="225" r="30" fill="#fff" stroke="#1E3050" stroke-width="5"/>
    <circle cx="120" cy="225" r="12" fill="#1E3050"/>
  </g>
  <g stroke="#C0392B" stroke-width="7" stroke-linecap="round">
    <line x1="170" y1="195" x2="210" y2="255"/>
    <line x1="210" y1="195" x2="170" y2="255"/>
  </g>
  <text x="400" y="425" font-family="'Noto Sans JP', sans-serif" font-size="22" fill="#1E3050" text-anchor="middle" font-weight="700">外から見えにくい</text>
  <g>
    <rect x="24" y="24" width="120" height="34" rx="17" fill="#122036" opacity="0.78"/>
    <text x="84" y="47" font-family="'Noto Sans JP', sans-serif" font-size="17" fill="#FBF9F4" text-anchor="middle">イメージ</text>
  </g>
</svg>
